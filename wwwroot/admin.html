<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HamDeck — Admin</title>
<link rel="stylesheet" href="style.css">
<style>
.admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; padding: 0.75rem 1.2rem; max-width: 1200px; margin: 0 auto; }
@media (max-width: 720px) { .admin-grid { grid-template-columns: 1fr; } }
.admin-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
.admin-card h3 { font-family: var(--mono); font-size: 0.75rem; font-weight: 600; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.75rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border); }
.admin-row { display: flex; justify-content: space-between; align-items: center; padding: 0.4rem 0; font-family: var(--mono); font-size: 0.8rem; }
.admin-row + .admin-row { border-top: 1px solid rgba(28,41,64,0.5); }
.admin-label { color: var(--text-dim); }
.admin-val { color: var(--text); font-weight: 600; }
.admin-val.ok { color: var(--green); }
.admin-val.err { color: var(--red); }
.admin-input { font-family: var(--mono); font-size: 0.85rem; padding: 0.4rem 0.6rem; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); outline: none; width: 100%; }
.admin-input:focus { border-color: var(--accent); }
.admin-btn { font-family: var(--mono); font-size: 0.78rem; font-weight: 600; padding: 0.4rem 0.8rem; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.15s; border: 1px solid var(--border); }
.admin-btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.admin-btn-primary:hover { background: #2563eb; }
.admin-btn-danger { background: transparent; color: var(--red); border-color: rgba(239,68,68,0.3); }
.admin-btn-danger:hover { background: var(--red-dim); }
.admin-btn-sm { padding: 0.25rem 0.5rem; font-size: 0.72rem; }
.form-row { display: flex; gap: 0.4rem; margin-top: 0.5rem; }
.form-row .admin-input { flex: 1; }
.user-table { width: 100%; border-collapse: collapse; }
.user-table th { font-family: var(--mono); font-size: 0.65rem; color: var(--text-muted); text-align: left; padding: 0.3rem; letter-spacing: 0.08em; text-transform: uppercase; border-bottom: 1px solid var(--border); }
.user-table td { font-family: var(--mono); font-size: 0.78rem; padding: 0.35rem 0.3rem; border-bottom: 1px solid rgba(28,41,64,0.5); color: var(--text-dim); }
.user-table .name { color: var(--text); font-weight: 500; }
.badge-admin { font-size: 0.65rem; background: var(--amber-dim); color: var(--amber); padding: 0.1rem 0.3rem; border-radius: 3px; }
.badge-user { font-size: 0.65rem; background: var(--accent-dim); color: var(--accent); padding: 0.1rem 0.3rem; border-radius: 3px; }
.badge-tx-on  { font-size: 0.65rem; background: var(--green-dim); color: var(--green); padding: 0.1rem 0.3rem; border-radius: 3px; }
.badge-tx-off { font-size: 0.65rem; background: var(--red-dim);   color: var(--red);   padding: 0.1rem 0.3rem; border-radius: 3px; }
.lockdown-bar { display: flex; align-items: center; justify-content: space-between; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
.admin-btn-warning { background: transparent; color: var(--amber); border-color: rgba(245,158,11,0.35); }
.admin-btn-warning:hover { background: var(--amber-dim); }
.admin-btn-green { background: transparent; color: var(--green); border-color: rgba(34,197,94,0.3); }
.admin-btn-green:hover { background: var(--green-dim); }
.slider-container { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; }
.slider-container input[type="range"] { flex: 1; accent-color: var(--accent); }
.slider-val-display { font-family: var(--mono); font-size: 0.85rem; font-weight: 600; min-width: 2.5rem; text-align: center; }
.msg { font-family: var(--mono); font-size: 0.8rem; padding: 0.4rem 0.6rem; border-radius: var(--radius-sm); margin-top: 0.5rem; display: none; }
.msg-ok { background: var(--green-dim); color: var(--green); }
.msg-err { background: var(--red-dim); color: var(--red); }
.log-box { font-family: var(--mono); font-size: 0.72rem; color: var(--text-dim); background: var(--bg-deep); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.5rem; max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
</style>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2d8cf0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HamDeck">
    <link rel="apple-touch-icon" href="/icons/icon-192.png"></head>
<body>

<header class="topbar">
    <div class="topbar-left">
        <div class="topbar-logo">HAM<span>DECK</span></div>
        <span class="topbar-version">ADMIN</span>
    </div>
    <div class="topbar-right">
        <a href="/" style="font-family:var(--mono);font-size:0.8rem;color:var(--text-dim);text-decoration:none;">← DASHBOARD</a>
        <button class="btn-logout" onclick="logout()">LOGOUT</button>
    </div>
</header>

<div class="admin-grid">

    <!-- RADIO STATUS -->
    <div class="admin-card">
        <h3>Radio Status</h3>
        <div id="radio-status">Loading...</div>
    </div>

    <!-- TX AUDIO -->
    <div class="admin-card">
        <h3>TX Audio / Remote Mic</h3>
        <div id="tx-status">Loading...</div>
        <div style="margin-top:0.75rem;">
            <span class="admin-label">RPORT Gain</span>
            <div class="slider-container">
                <input type="range" id="rport-slider" min="0" max="100" value="50">
                <span class="slider-val-display" id="rport-val">50</span>
            </div>
        </div>
        <div style="margin-top:0.5rem;">
            <button class="admin-btn admin-btn-danger" onclick="releaseMic()">Release Mic</button>
        </div>
    </div>

    <!-- USER MANAGEMENT -->
    <div class="admin-card">
        <h3>Users</h3>
        <table class="user-table">
            <thead><tr><th>User</th><th>Role</th><th>TX</th><th>Actions</th></tr></thead>
            <tbody id="user-list"></tbody>
        </table>
        <div style="margin-top:0.75rem; border-top:1px solid var(--border); padding-top:0.75rem;">
            <span class="admin-label">Add User</span>
            <div class="form-row">
                <input class="admin-input" id="new-user" placeholder="Username" spellcheck="false">
                <input class="admin-input" id="new-pass" type="password" placeholder="Password">
            </div>
            <div class="form-row">
                <label style="font-family:var(--mono);font-size:0.75rem;color:var(--text-dim);display:flex;align-items:center;gap:0.3rem;">
                    <input type="checkbox" id="new-admin"> Admin
                </label>
                <button class="admin-btn admin-btn-primary" onclick="addUser()">Add User</button>
            </div>
            <div id="user-msg" class="msg"></div>
        </div>
    </div>

    <!-- CHANGE PASSWORD -->
    <div class="admin-card">
        <h3>Change Password</h3>
        <div class="form-row">
            <input class="admin-input" id="cp-user" placeholder="Username" spellcheck="false">
            <input class="admin-input" id="cp-pass" type="password" placeholder="New password">
        </div>
        <div class="form-row">
            <button class="admin-btn admin-btn-primary" onclick="changePassword()">Change Password</button>
        </div>
        <div id="cp-msg" class="msg"></div>
    </div>

    <!-- ACTIVE SESSIONS -->
    <div class="admin-card" style="grid-column: span 2;">
        <h3>Active Sessions</h3>
        <table class="user-table">
            <thead><tr><th>User</th><th>Role</th><th>Last Active</th><th>Idle</th><th>Actions</th></tr></thead>
            <tbody id="session-list"></tbody>
        </table>
    </div>

</div>

<script>
const API = window.location.origin;

async function apiFetch(path, opts) {
    const resp = await fetch(API + path, opts);
    return await resp.json();
}
async function apiPost(path, body) {
    return apiFetch(path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
}

function showMsg(id, text, ok) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg ' + (ok ? 'msg-ok' : 'msg-err');
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 4000);
}

// Check admin auth
async function checkAdmin() {
    const data = await apiFetch('/api/auth/status');
    if (!data.authenticated || !data.is_admin) {
        window.location.href = '/';
        return false;
    }
    return true;
}

// Load radio status
async function loadRadioStatus() {
    const data = await apiFetch('/api/admin/radio');
    if (!data || data.status !== 'ok') return;
    document.getElementById('radio-status').innerHTML = `
        <div class="admin-row"><span class="admin-label">Connection</span><span class="admin-val ${data.connected ? 'ok' : 'err'}">${data.connected ? 'CONNECTED' : 'DISCONNECTED'}</span></div>
        <div class="admin-row"><span class="admin-label">Port</span><span class="admin-val">${data.port || '—'}</span></div>
        <div class="admin-row"><span class="admin-label">Frequency</span><span class="admin-val">${data.freq || '—'}</span></div>
        <div class="admin-row"><span class="admin-label">Mode</span><span class="admin-val">${data.mode || '—'}</span></div>
        <div class="admin-row"><span class="admin-label">TX</span><span class="admin-val ${data.tx ? 'err' : ''}">${data.tx ? 'TRANSMITTING' : 'RX'}</span></div>
        <div class="admin-row"><span class="admin-label">Active Sessions</span><span class="admin-val">${data.sessions}</span></div>
        <div class="admin-row"><span class="admin-label">Proxy Active</span><span class="admin-val">${data.proxy_active ? 'YES' : 'NO'}</span></div>
        <div class="lockdown-bar">
            <span class="admin-label" style="font-family:var(--mono);font-size:0.78rem;">
                Login Lockdown: <span id="lockdown-badge" style="margin-left:0.3rem;"></span>
            </span>
            <div style="display:flex;gap:0.4rem;">
                <button class="admin-btn admin-btn-warning admin-btn-sm" onclick="setLockdown(true)">LOCK</button>
                <button class="admin-btn admin-btn-green admin-btn-sm" onclick="setLockdown(false)">UNLOCK</button>
            </div>
        </div>
    `;
    updateLockdownBadge(data.admin_only_login);
}

function updateLockdownBadge(locked) {
    const el = document.getElementById('lockdown-badge');
    if (!el) return;
    el.innerHTML = locked
        ? '<span class="badge-tx-off">ADMIN ONLY</span>'
        : '<span class="badge-tx-on">OPEN</span>';
}

// Load TX audio status
async function loadTxStatus() {
    const data = await apiFetch('/api/tx-audio/status');
    if (!data) return;
    const remoteData = await apiFetch('/api/remote-tx/status');
    document.getElementById('tx-status').innerHTML = `
        <div class="admin-row"><span class="admin-label">TX Audio Service</span><span class="admin-val ${data.available ? 'ok' : 'err'}">${data.available ? 'AVAILABLE' : 'DISABLED'}</span></div>
        <div class="admin-row"><span class="admin-label">Audio Streaming</span><span class="admin-val ${data.active ? 'ok' : ''}">${data.active ? 'ACTIVE' : 'IDLE'}</span></div>
        <div class="admin-row"><span class="admin-label">Client Connected</span><span class="admin-val ${data.client_connected ? 'ok' : ''}">${data.client_connected ? 'YES' : 'NO'}</span></div>
        <div class="admin-row"><span class="admin-label">MOD Source</span><span class="admin-val">${remoteData?.mod_source_rear ? 'REAR (USB)' : 'MIC'}</span></div>
        <div class="admin-row"><span class="admin-label">RPORT Gain</span><span class="admin-val">${remoteData?.rport_gain ?? '—'}</span></div>
    `;
    if (remoteData?.rport_gain !== undefined) {
        document.getElementById('rport-slider').value = remoteData.rport_gain;
        document.getElementById('rport-val').textContent = remoteData.rport_gain;
    }
}

// Load users
async function loadUsers() {
    const data = await apiFetch('/api/admin/users');
    if (!data || data.status !== 'ok') return;
    const tbody = document.getElementById('user-list');
    tbody.innerHTML = data.users.map(u => `
        <tr>
            <td class="name">${u.username}</td>
            <td><span class="${u.is_admin ? 'badge-admin' : 'badge-user'}">${u.is_admin ? 'ADMIN' : 'USER'}</span></td>
            <td>
                ${u.can_transmit
                    ? `<button class="admin-btn admin-btn-danger admin-btn-sm" onclick="setUserTx('${u.username}', false)" title="Click to disable TX"><span class="badge-tx-on">ON</span></button>`
                    : `<button class="admin-btn admin-btn-green admin-btn-sm" onclick="setUserTx('${u.username}', true)" title="Click to enable TX"><span class="badge-tx-off">OFF</span></button>`
                }
            </td>
            <td>${u.is_admin ? '' : `<button class="admin-btn admin-btn-danger admin-btn-sm" onclick="removeUser('${u.username}')">Remove</button>`}</td>
        </tr>
    `).join('');
}

// Load sessions
async function loadSessions() {
    const data = await apiFetch('/api/admin/sessions');
    if (!data || data.status !== 'ok') return;
    const tbody = document.getElementById('session-list');
    tbody.innerHTML = data.sessions.map(s => {
        const idle = s.idle_seconds < 60 ? s.idle_seconds + 's' : Math.floor(s.idle_seconds / 60) + 'm';
        return `
            <tr>
                <td class="name">${s.username}</td>
                <td><span class="${s.is_admin ? 'badge-admin' : 'badge-user'}">${s.is_admin ? 'ADMIN' : 'USER'}</span></td>
                <td>${new Date(s.last_activity).toLocaleTimeString()}</td>
                <td>${idle}</td>
                <td><button class="admin-btn admin-btn-danger admin-btn-sm" onclick="kickUser('${s.username}')">Kick</button></td>
            </tr>
        `;
    }).join('');
}

// Actions
async function addUser() {
    const username = document.getElementById('new-user').value.trim();
    const password = document.getElementById('new-pass').value;
    const isAdmin = document.getElementById('new-admin').checked;
    if (!username || !password) return showMsg('user-msg', 'Fill in both fields', false);
    const data = await apiPost('/api/admin/user/add', { username, password, is_admin: isAdmin, can_transmit: true });
    showMsg('user-msg', data.message, data.status === 'ok');
    if (data.status === 'ok') { document.getElementById('new-user').value = ''; document.getElementById('new-pass').value = ''; loadUsers(); }
}

async function removeUser(username) {
    if (!confirm('Remove user ' + username + '?')) return;
    await apiFetch('/api/admin/user/remove/' + username);
    loadUsers(); loadSessions();
}

async function changePassword() {
    const username = document.getElementById('cp-user').value.trim();
    const newPassword = document.getElementById('cp-pass').value;
    if (!username || !newPassword) return showMsg('cp-msg', 'Fill in both fields', false);
    const data = await apiPost('/api/admin/user/password', { username, new_password: newPassword });
    showMsg('cp-msg', data.message, data.status === 'ok');
    if (data.status === 'ok') { document.getElementById('cp-pass').value = ''; }
}

async function kickUser(username) {
    await apiFetch('/api/admin/kick/' + username);
    loadSessions();
}

async function releaseMic() {
    const data = await apiFetch('/api/admin/mic/release');
    showMsg('user-msg', data.message || 'Mic released', true);
    loadTxStatus();
}

async function setLockdown(enable) {
    const data = await apiFetch('/api/admin/lockdown/' + (enable ? 'on' : 'off'));
    updateLockdownBadge(data.admin_only_login);
    showMsg('user-msg', data.message || (enable ? 'Login locked' : 'Login unlocked'), data.status === 'ok');
}

async function setUserTx(username, allow) {
    const action = allow ? 'enable' : 'disable';
    const data = await apiFetch(`/api/admin/user/tx/${action}/${username}`);
    if (data.status === 'ok') loadUsers();
    else showMsg('user-msg', data.message || 'Error', false);
}

async function logout() {
    await apiFetch('/api/auth/logout');
    window.location.href = '/login.html';
}

// RPORT gain slider
document.getElementById('rport-slider').addEventListener('input', (e) => {
    document.getElementById('rport-val').textContent = e.target.value;
});
document.getElementById('rport-slider').addEventListener('change', async (e) => {
    await apiFetch('/api/admin/rport-gain/' + e.target.value);
});

// Init
async function init() {
    if (!await checkAdmin()) return;
    loadRadioStatus();
    loadTxStatus();
    loadUsers();
    loadSessions();
    setInterval(() => { loadRadioStatus(); loadTxStatus(); loadSessions(); }, 5000);
}
init();
</script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .catch(err => console.warn('SW registration failed:', err));
            });
        }
    </script></body>
</html>
